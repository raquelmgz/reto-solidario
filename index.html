<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8"/>
<title>Reto solidario</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }
#map { height: 80vh; }
#panel { padding:15px; background:white; text-align:center; font-size:22px; }
#progress { width:80%; height:25px; background:#ddd; margin:10px auto; border-radius:20px; }
#bar { height:100%; width:0%; background:#4CAF50; border-radius:20px; }
  #bigcounter{
 font-size:60px;
 font-weight:bold;
 color:#1a4cff;
 margin:10px;
}
</style>

</head>

<body>

<div id="panel">
<b>Reto solidario Vigo → Derang</b><br>
  <div id="bigcounter">0 km</div>
  <div id="pais" style="font-size:28px; font-weight:bold; color:#e53935;"></div>
<span id="info">Cargando...</span>
<div id="progress"><div id="bar"></div></div>
</div>

<div id="map"></div>

<script>

// ------------------ENLACE ------------------
const API_URL = "km.json";
// -----------------------------------------------------------

// distancia real
const TOTAL_KM = 8610;

// coordenadas
const route = [
  [42.2406, -8.7207],     // Vigo
  [22.92785, 85.14265]    // Derang
];

// mapa
const map = L.map('map').setView([30,20],3);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// arreglar iconos leaflet
delete L.Icon.Default.prototype._getIconUrl;
L.Icon.Default.mergeOptions({
  iconRetinaUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
  iconUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
  shadowUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png'
});

// icono personalizado
const kidIcon = L.icon({
  iconUrl: 'ninos.png',
  iconSize: [80,80],
  iconAnchor: [40,80]
});

// marcador
const marker = L.marker(route[0], {icon:kidIcon}).addTo(map);

// ---- matemáticas ----
function toRad(d){ return d*Math.PI/180; }
function toDeg(r){ return r*180/Math.PI; }

function greatCirclePoint(start,end,f){
  const lat1=toRad(start[0]);
  const lon1=toRad(start[1]);
  const lat2=toRad(end[0]);
  const lon2=toRad(end[1]);

  const d=2*Math.asin(Math.sqrt(
    Math.sin((lat2-lat1)/2)**2+
    Math.cos(lat1)*Math.cos(lat2)*Math.sin((lon2-lon1)/2)**2
  ));
  if(d===0) return start;

  const A=Math.sin((1-f)*d)/Math.sin(d);
  const B=Math.sin(f*d)/Math.sin(d);

  const x=A*Math.cos(lat1)*Math.cos(lon1)+B*Math.cos(lat2)*Math.cos(lon2);
  const y=A*Math.cos(lat1)*Math.sin(lon1)+B*Math.cos(lat2)*Math.sin(lon2);
  const z=A*Math.sin(lat1)+B*Math.sin(lat2);

  const lat=Math.atan2(z,Math.sqrt(x*x+y*y));
  const lon=Math.atan2(y,x);

  return [toDeg(lat),toDeg(lon)];
}

// ---- dibujar curva ----
let curve=[];
for(let i=0;i<=100;i++){
  curve.push(greatCirclePoint(route[0],route[1],i/100));
}
const line=L.polyline(curve,{color:'red',weight:3}).addTo(map);
map.fitBounds(line.getBounds());

//function paisActual(lat,lng){

// if(lng < -5) return "España";
 if(lng < 10) return "Francia";
 if(lng < 20) return "Italia";
 if(lng < 35) return "Grecia";
 if(lng < 55) return "Turquía";
 if(lng < 80) return "Pakistán";
 return "India 🇮🇳";
}//

  function paisActual(lat,lng){

if(lat>36 && lat<44 && lng>-10 && lng<5)
 return "España 🇪🇸";

if(lat>42 && lat<51 && lng>-5 && lng<8)
 return "Francia 🇫🇷";

if(lat>36 && lat<47 && lng>6 && lng<19)
 return "Italia 🇮🇹";

if(lat>34 && lat<42 && lng>19 && lng<29)
 return "Grecia 🇬🇷";

if(lat>36 && lat<42 && lng>26 && lng<45)
 return "Turquía 🇹🇷";

if(lat>23 && lat<37 && lng>60 && lng<77)
 return "Pakistán 🇵🇰";

return "India 🇮🇳";
}
  
// ---- cargar km ----
fetch(API_URL)
.then(r=>r.json())
.then(data=>{
  const km=data.total;
  const percent=Math.min(km/TOTAL_KM,1);

  const pos=greatCirclePoint(route[0],route[1],percent);
  marker.setLatLng(pos);

  const pais = paisActual(pos[0],pos[1]);
document.getElementById("pais").innerText =
"¡Hemos llegado a " + pais + "!";

  document.getElementById("info").innerHTML=
    km.toFixed(1)+" km recorridos — "+(TOTAL_KM-km).toFixed(1)+" km restantes";
document.getElementById("bigcounter").innerText =
km.toFixed(0)+" km";
  document.getElementById("bar").style.width=(percent*100)+"%";
});

</script>

</body>
</html>
